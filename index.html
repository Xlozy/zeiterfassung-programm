<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Zeit">
<meta name="theme-color" content="#0a0a0a">
<link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">
<link rel="icon" type="image/png" sizes="180x180" href="icon-180.png">
<link rel="apple-touch-icon" sizes="180x180" href="icon-180.png">
<title>Zeiterfassung</title>
<style>
:root {
  --bg: #0a0a0a;
  --surface: #161616;
  --surface-2: #1f1f1f;
  --border: #2a2a2a;
  --text: #ededed;
  --text-dim: #8a8a8a;
  --accent: #4ade80;
  --warn: #f59e0b;
  --danger: #ef4444;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
  -webkit-font-smoothing: antialiased;
  -webkit-tap-highlight-color: transparent;
  font-size: 16px;
}
body {
  display: flex;
  flex-direction: column;
  padding-top: env(safe-area-inset-top);
}
header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 8px 14px;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
}
.header-title {
  font-size: 13px;
  font-weight: 600;
  color: var(--text-dim);
  letter-spacing: 0.3px;
  text-transform: uppercase;
}
.header-right {
  display: flex;
  gap: 4px;
  align-items: center;
}
.sync-status {
  font-size: 18px;
  line-height: 1;
  cursor: pointer;
  padding: 4px 8px;
  border: none;
  background: none;
}
.sync-status.synced { color: var(--accent); }
.sync-status.syncing { color: var(--warn); animation: pulse 1s ease-in-out infinite; }
.sync-status.error { color: var(--danger); }
.sync-status.off { color: var(--text-dim); }
@keyframes pulse { 50% { opacity: 0.35; } }
.icon-btn {
  background: none;
  border: none;
  color: var(--text-dim);
  font-size: 18px;
  cursor: pointer;
  padding: 4px 8px;
  font-family: inherit;
}

main {
  flex: 1;
  overflow-y: auto;
  padding: 20px 16px 16px;
  -webkit-overflow-scrolling: touch;
}
nav {
  display: flex;
  border-top: 1px solid var(--border);
  background: var(--surface);
  padding-bottom: env(safe-area-inset-bottom);
}
nav button {
  flex: 1;
  padding: 14px;
  background: none;
  border: none;
  color: var(--text-dim);
  font-size: 15px;
  font-weight: 500;
  cursor: pointer;
  font-family: inherit;
}
nav button.active { color: var(--accent); }

.timer-display {
  font-size: 56px;
  font-weight: 200;
  text-align: center;
  font-variant-numeric: tabular-nums;
  margin: 24px 0 16px;
  letter-spacing: -1px;
}
.timer-display.idle { color: var(--text-dim); }
.context {
  text-align: center;
  color: var(--text-dim);
  font-size: 14px;
  margin-bottom: 28px;
  min-height: 20px;
  padding: 0 8px;
  line-height: 1.4;
}
.context strong {
  color: var(--accent);
  font-weight: 600;
  text-transform: uppercase;
  font-size: 12px;
  letter-spacing: 0.5px;
  display: block;
  margin-bottom: 4px;
}

input[type=text], input[type=password], input[type=date], input[type=datetime-local], textarea, select {
  width: 100%;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  color: var(--text);
  font-size: 16px;
  padding: 12px 14px;
  font-family: inherit;
  -webkit-appearance: none;
  appearance: none;
}
input:focus, textarea:focus, select:focus {
  outline: none;
  border-color: var(--accent);
}
textarea { resize: vertical; min-height: 70px; }
label {
  display: block;
  color: var(--text-dim);
  font-size: 13px;
  margin: 14px 0 6px;
}
label:first-child { margin-top: 0; }

.big-btn {
  display: block;
  width: 100%;
  margin-top: 24px;
  padding: 18px;
  font-size: 18px;
  font-weight: 600;
  border: none;
  border-radius: 12px;
  cursor: pointer;
  font-family: inherit;
  transition: transform 0.05s;
}
.big-btn:active { transform: scale(0.98); }
.big-btn.start { background: var(--accent); color: #000; }
.big-btn.start:disabled {
  background: var(--surface-2);
  color: var(--text-dim);
  cursor: not-allowed;
}
.big-btn.stop { background: var(--danger); color: #fff; }

.list-controls {
  display: flex;
  gap: 8px;
  margin-bottom: 12px;
}
.list-controls select, .list-controls input {
  flex: 1; min-width: 0;
  font-size: 14px; padding: 10px 12px;
}
.summary {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 10px 14px;
  margin-bottom: 12px;
  font-size: 13px;
  color: var(--text-dim);
  display: flex;
  justify-content: space-between;
}
.summary strong { color: var(--text); font-variant-numeric: tabular-nums; }

.entry {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 12px 14px;
  margin-bottom: 8px;
  cursor: pointer;
}
.entry:active { background: var(--surface-2); }
.entry.incomplete { border-left: 3px solid var(--warn); }
.entry-head {
  display: flex; justify-content: space-between;
  font-size: 12px; color: var(--text-dim);
  margin-bottom: 6px;
  font-variant-numeric: tabular-nums;
}
.entry-project {
  font-size: 11px; color: var(--accent);
  text-transform: uppercase; letter-spacing: 0.5px;
  margin-bottom: 4px; font-weight: 600;
}
.entry-intent { font-size: 15px; color: var(--text); margin-bottom: 4px; line-height: 1.35; }
.entry-result { font-size: 13px; color: var(--text-dim); line-height: 1.35; }
.entry-duration { font-weight: 600; color: var(--text); }
.empty {
  text-align: center; color: var(--text-dim);
  padding: 48px 16px; font-size: 14px;
}

.exports {
  display: flex; gap: 8px;
  margin-top: 20px; flex-wrap: wrap;
}
.exports button, .exports label.btn {
  flex: 1; min-width: 0;
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 10px 8px;
  border-radius: 8px;
  font-size: 13px;
  cursor: pointer;
  text-align: center;
  font-family: inherit;
}

.modal-back {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.7);
  display: none; align-items: flex-end;
  z-index: 10;
}
.modal-back.show { display: flex; }
.modal {
  background: var(--surface);
  width: 100%;
  border-radius: 16px 16px 0 0;
  padding: 20px 16px calc(20px + env(safe-area-inset-bottom));
  max-height: 92vh; overflow-y: auto;
}
.modal h2 { font-size: 17px; margin-bottom: 14px; }
.modal p.hint { font-size: 13px; color: var(--text-dim); line-height: 1.4; margin-bottom: 14px; }
.modal p.hint a { color: var(--accent); text-decoration: none; }
.modal-buttons {
  display: flex; gap: 8px; margin-top: 18px;
}
.modal-buttons button {
  flex: 1; padding: 12px;
  border-radius: 8px; border: none;
  font-size: 15px; font-weight: 500;
  cursor: pointer; font-family: inherit;
}
.modal-buttons .save { background: var(--accent); color: #000; }
.modal-buttons .cancel { background: var(--surface-2); color: var(--text); }
.modal-buttons .delete { background: var(--danger); color: #fff; }
#cfg-result { margin-top: 12px; font-size: 13px; min-height: 18px; }
#cfg-result.ok { color: var(--accent); }
#cfg-result.err { color: var(--danger); }

@media (min-width: 600px) {
  header, main, nav { max-width: 640px; margin-left: auto; margin-right: auto; width: 100%; }
}
</style>
</head>
<body>
<header>
  <div class="header-title">Zeiterfassung</div>
  <div class="header-right">
    <button class="sync-status off" id="sync-status" title="Sync nicht eingerichtet">●</button>
    <button class="icon-btn" id="btn-settings" title="Einstellungen">⚙</button>
  </div>
</header>

<main>
  <section id="screen-timer">
    <div id="timer-display" class="timer-display idle">00:00:00</div>
    <div id="context" class="context"></div>
    <div id="timer-idle-form">
      <label for="project">Projekt (optional)</label>
      <input type="text" id="project" list="projects" autocomplete="off" placeholder="z. B. Webseite Müller">
      <datalist id="projects"></datalist>
      <label for="intent">Was hast du vor?</label>
      <textarea id="intent" placeholder="Kurz beschreiben, worauf du dich fokussierst"></textarea>
      <button class="big-btn start" id="btn-start" disabled>Start</button>
    </div>
    <div id="timer-running-form" style="display:none">
      <label for="result">Was hast du gemacht? <span style="color:var(--text-dim)">(kann leer bleiben)</span></label>
      <textarea id="result" placeholder="Kurz festhalten, was du erreicht hast"></textarea>
      <button class="big-btn stop" id="btn-stop">Stopp</button>
    </div>
  </section>

  <section id="screen-list" style="display:none">
    <div class="list-controls">
      <select id="filter-project"><option value="">Alle Projekte</option></select>
      <input type="date" id="filter-date">
    </div>
    <div class="summary" id="summary"></div>
    <div id="entries"></div>
    <div class="exports">
      <button id="btn-csv">CSV</button>
      <button id="btn-json">JSON</button>
      <label class="btn" for="file-import">Import<input type="file" id="file-import" accept=".json" style="display:none"></label>
    </div>
  </section>
</main>

<nav>
  <button id="tab-timer" class="active">Stoppuhr</button>
  <button id="tab-list">Liste</button>
</nav>

<div class="modal-back" id="modal-back">
  <div class="modal">
    <h2>Eintrag bearbeiten</h2>
    <label>Projekt</label>
    <input type="text" id="edit-project">
    <label>Absicht</label>
    <textarea id="edit-intent"></textarea>
    <label>Ergebnis</label>
    <textarea id="edit-result"></textarea>
    <label>Startzeit</label>
    <input type="datetime-local" id="edit-start">
    <label>Stoppzeit</label>
    <input type="datetime-local" id="edit-stop">
    <div class="modal-buttons">
      <button class="cancel" id="edit-cancel">Abbrechen</button>
      <button class="delete" id="edit-delete">Löschen</button>
      <button class="save" id="edit-save">Speichern</button>
    </div>
  </div>
</div>

<div class="modal-back" id="settings-back">
  <div class="modal">
    <h2>Sync-Einstellungen</h2>
    <p class="hint">
      Verbindet die App mit einem privaten GitHub-Repo, damit Mac und iPhone automatisch synchron bleiben.
      Token erstellen unter <a href="https://github.com/settings/tokens?type=beta" target="_blank">github.com/settings/tokens</a> — nur „Contents: Read and write" auf dein Daten-Repo nötig.
    </p>
    <label>GitHub-Benutzername</label>
    <input type="text" id="cfg-owner" autocomplete="off" autocapitalize="off" placeholder="dein-username">
    <label>Daten-Repo (privat)</label>
    <input type="text" id="cfg-repo" autocomplete="off" autocapitalize="off" value="zeiterfassung-data">
    <label>Datei-Pfad im Repo</label>
    <input type="text" id="cfg-path" autocomplete="off" autocapitalize="off" value="data.json">
    <label>Personal Access Token</label>
    <input type="password" id="cfg-token" autocomplete="off" placeholder="github_pat_…">
    <div id="cfg-result"></div>
    <div class="modal-buttons">
      <button class="cancel" id="cfg-cancel">Abbrechen</button>
      <button class="delete" id="cfg-clear">Trennen</button>
      <button class="save" id="cfg-save">Speichern</button>
    </div>
  </div>
</div>

<script>
'use strict';

const STORAGE_KEY = 'zeiterfassung_v1';
const ACTIVE_KEY = 'zeiterfassung_active_v1';
const CONFIG_KEY = 'zeiterfassung_config_v1';
const SYNC_INTERVAL_MS = 60000;

let entries = [];
let active = null;
let syncConfig = null;
let syncStatus = 'off';
let editingId = null;
let tickInterval = null;
let syncPollTimer = null;
let syncInFlight = false;
let currentScreen = 'timer';

try {
  entries = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
  active = JSON.parse(localStorage.getItem(ACTIVE_KEY) || 'null');
  syncConfig = JSON.parse(localStorage.getItem(CONFIG_KEY) || 'null');
} catch (e) { console.error('Speicher lesen fehlgeschlagen', e); }

let migrated = false;
entries.forEach(e => {
  if (!e.modified) { e.modified = e.stop || e.start; migrated = true; }
});

const $ = (id) => document.getElementById(id);
const pad = (n) => n.toString().padStart(2, '0');
const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
const nowIso = () => new Date().toISOString();

function saveAll() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(entries));
    localStorage.setItem(ACTIVE_KEY, JSON.stringify(active));
  } catch (e) {
    alert('Speichern fehlgeschlagen: ' + e.message);
  }
}
function saveConfig() {
  if (syncConfig) localStorage.setItem(CONFIG_KEY, JSON.stringify(syncConfig));
  else localStorage.removeItem(CONFIG_KEY);
}

function formatDuration(ms) {
  if (ms < 0) ms = 0;
  const s = Math.floor(ms / 1000);
  return `${pad(Math.floor(s/3600))}:${pad(Math.floor((s%3600)/60))}:${pad(s%60)}`;
}
function formatDate(iso) {
  const d = new Date(iso);
  return `${pad(d.getDate())}.${pad(d.getMonth()+1)}.${d.getFullYear()}`;
}
function formatTime(iso) {
  const d = new Date(iso);
  return `${pad(d.getHours())}:${pad(d.getMinutes())}`;
}
function formatTimeFull(iso) {
  const d = new Date(iso);
  return `${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
}
function escapeHtml(s) {
  return (s || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

// ---------- Sync (GitHub Contents API) ----------

function utf8ToBase64(str) {
  return btoa(unescape(encodeURIComponent(str)));
}
function base64ToUtf8(b64) {
  return decodeURIComponent(escape(atob(b64.replace(/\s/g, ''))));
}

function setSyncStatus(s, hint) {
  syncStatus = s;
  const el = $('sync-status');
  el.className = 'sync-status ' + (s === 'idle' ? 'synced' : s === 'syncing' ? 'syncing' : s === 'error' ? 'error' : 'off');
  el.title = hint || ({
    'idle': 'Synchronisiert · tippen für manuellen Sync',
    'syncing': 'Synchronisiert gerade…',
    'error': 'Sync-Fehler · tippen für Details',
    'off': 'Sync nicht eingerichtet · auf ⚙ tippen'
  }[s] || '');
}

async function githubGet() {
  const { token, owner, repo, path } = syncConfig;
  const url = `https://api.github.com/repos/${encodeURIComponent(owner)}/${encodeURIComponent(repo)}/contents/${path.split('/').map(encodeURIComponent).join('/')}`;
  const r = await fetch(url, {
    headers: {
      'Authorization': `Bearer ${token}`,
      'Accept': 'application/vnd.github+json',
      'X-GitHub-Api-Version': '2022-11-28'
    },
    cache: 'no-store'
  });
  if (r.status === 404) return { entries: [], sha: null };
  if (!r.ok) {
    const t = await r.text();
    throw new Error(`GET ${r.status}: ${t.slice(0,200)}`);
  }
  const data = await r.json();
  const text = base64ToUtf8(data.content);
  let parsed;
  try { parsed = JSON.parse(text); } catch (e) { throw new Error('Daten-Datei nicht lesbar (kein JSON)'); }
  return { entries: Array.isArray(parsed.entries) ? parsed.entries : [], sha: data.sha };
}

async function githubPut(allEntries, sha) {
  const { token, owner, repo, path } = syncConfig;
  const url = `https://api.github.com/repos/${encodeURIComponent(owner)}/${encodeURIComponent(repo)}/contents/${path.split('/').map(encodeURIComponent).join('/')}`;
  const body = {
    message: `Sync ${new Date().toISOString()}`,
    content: utf8ToBase64(JSON.stringify({ version: 1, updated: nowIso(), entries: allEntries }, null, 2)),
  };
  if (sha) body.sha = sha;
  const r = await fetch(url, {
    method: 'PUT',
    headers: {
      'Authorization': `Bearer ${token}`,
      'Accept': 'application/vnd.github+json',
      'Content-Type': 'application/json',
      'X-GitHub-Api-Version': '2022-11-28'
    },
    body: JSON.stringify(body)
  });
  if (!r.ok) {
    const t = await r.text();
    const err = new Error(`PUT ${r.status}: ${t.slice(0,200)}`);
    err.status = r.status;
    throw err;
  }
  const data = await r.json();
  return data.content.sha;
}

function mergeEntries(local, remote) {
  const map = new Map();
  remote.forEach(e => map.set(e.id, e));
  local.forEach(e => {
    const existing = map.get(e.id);
    if (!existing) { map.set(e.id, e); return; }
    const tLocal = new Date(e.modified || e.stop || e.start).getTime();
    const tRemote = new Date(existing.modified || existing.stop || existing.start).getTime();
    if (tLocal >= tRemote) map.set(e.id, e);
  });
  return Array.from(map.values()).sort((a,b) => new Date(a.start) - new Date(b.start));
}

function visibleEntries(all) {
  return all.filter(e => !e.deleted);
}

function entriesEqual(a, b) {
  if (a.length !== b.length) return false;
  const ma = new Map(a.map(e => [e.id, (e.modified || e.stop || e.start) + (e.deleted ? '|D' : '')]));
  for (const e of b) {
    const key = (e.modified || e.stop || e.start) + (e.deleted ? '|D' : '');
    if (ma.get(e.id) !== key) return false;
  }
  return true;
}

async function syncNow({ force = false } = {}) {
  if (!syncConfig) return;
  if (syncInFlight) return;
  syncInFlight = true;
  setSyncStatus('syncing');
  try {
    let attempts = 0;
    while (attempts < 3) {
      attempts++;
      const remote = await githubGet();
      // Lokale entries enthalten KEINE Tombstones (die sind nur im Sync-Stream)
      // Für den Merge brauchen wir aber lokale + remote inkl. Tombstones
      const localWithTombstones = entries.slice();
      const merged = mergeEntries(localWithTombstones, remote.entries);
      const sameAsRemote = entriesEqual(merged, remote.entries);
      const visibleMerged = visibleEntries(merged);
      const sameAsLocal = entriesEqual(visibleMerged, entries);
      if (!sameAsLocal) {
        entries = visibleMerged;
        saveAll();
        refreshProjectList();
        if (currentScreen === 'list') renderList();
      }
      if (sameAsRemote && !force) {
        setSyncStatus('idle');
        return;
      }
      try {
        await githubPut(merged, remote.sha);
        setSyncStatus('idle');
        return;
      } catch (err) {
        if ((err.status === 409 || err.status === 422) && attempts < 3) continue;
        throw err;
      }
    }
  } catch (err) {
    console.error('Sync-Fehler', err);
    window._lastSyncError = err.message;
    setSyncStatus('error', 'Sync-Fehler: ' + err.message);
  } finally {
    syncInFlight = false;
  }
}

function schedulePoll() {
  if (syncPollTimer) clearInterval(syncPollTimer);
  if (syncConfig) {
    syncPollTimer = setInterval(() => syncNow(), SYNC_INTERVAL_MS);
  }
}

// ---------- Timer + Liste ----------

function renderTimer() {
  const display = $('timer-display');
  const context = $('context');
  if (active) {
    $('timer-idle-form').style.display = 'none';
    $('timer-running-form').style.display = 'block';
    display.classList.remove('idle');
    display.textContent = formatDuration(Date.now() - new Date(active.start).getTime());
    let html = '';
    if (active.project) html += `<strong>${escapeHtml(active.project)}</strong>`;
    html += escapeHtml(active.intent);
    context.innerHTML = html;
  } else {
    $('timer-idle-form').style.display = 'block';
    $('timer-running-form').style.display = 'none';
    display.classList.add('idle');
    display.textContent = '00:00:00';
    context.innerHTML = '';
  }
}
function startTicking() {
  stopTicking();
  tickInterval = setInterval(() => {
    if (active) $('timer-display').textContent = formatDuration(Date.now() - new Date(active.start).getTime());
  }, 500);
}
function stopTicking() {
  if (tickInterval) { clearInterval(tickInterval); tickInterval = null; }
}
function updateStartButton() {
  $('btn-start').disabled = $('intent').value.trim().length === 0;
}
function refreshProjectList() {
  const set = new Set();
  entries.forEach(e => { if (e.project) set.add(e.project); });
  const list = Array.from(set).sort((a,b) => a.localeCompare(b, 'de'));
  $('projects').innerHTML = list.map(p => `<option value="${escapeHtml(p)}">`).join('');
  const sel = $('filter-project');
  const current = sel.value;
  sel.innerHTML = '<option value="">Alle Projekte</option>' + list.map(p => `<option value="${escapeHtml(p)}">${escapeHtml(p)}</option>`).join('');
  sel.value = current;
}
function renderList() {
  const projectFilter = $('filter-project').value;
  const dateFilter = $('filter-date').value;
  const container = $('entries');
  const sorted = entries.slice().sort((a,b) => new Date(b.start) - new Date(a.start));
  const filtered = sorted.filter(e => {
    if (projectFilter && e.project !== projectFilter) return false;
    if (dateFilter) {
      const eDate = new Date(e.start).toISOString().slice(0,10);
      if (eDate !== dateFilter) return false;
    }
    return true;
  });
  let totalMs = 0;
  filtered.forEach(e => { if (e.stop) totalMs += new Date(e.stop) - new Date(e.start); });
  $('summary').innerHTML = `<span>${filtered.length} Eintr${filtered.length === 1 ? 'ag' : 'äge'}</span><strong>${formatDuration(totalMs)}</strong>`;
  if (filtered.length === 0) {
    container.innerHTML = '<div class="empty">Keine Einträge.</div>';
    return;
  }
  container.innerHTML = filtered.map(e => {
    const dur = e.stop ? (new Date(e.stop) - new Date(e.start)) : 0;
    const incomplete = !e.result || e.result.trim() === '';
    return `<div class="entry ${incomplete ? 'incomplete' : ''}" data-id="${e.id}">
      <div class="entry-head">
        <span>${formatDate(e.start)} · ${formatTime(e.start)}–${e.stop ? formatTime(e.stop) : '…'}</span>
        <span class="entry-duration">${formatDuration(dur)}</span>
      </div>
      ${e.project ? `<div class="entry-project">${escapeHtml(e.project)}</div>` : ''}
      <div class="entry-intent">${escapeHtml(e.intent) || '<em style="color:var(--text-dim)">(keine Absicht)</em>'}</div>
      ${e.result ? `<div class="entry-result">→ ${escapeHtml(e.result)}</div>` : '<div class="entry-result" style="font-style:italic">→ noch nicht festgehalten</div>'}
    </div>`;
  }).join('');
  container.querySelectorAll('.entry').forEach(el => {
    el.addEventListener('click', () => openEdit(el.dataset.id));
  });
}
function switchScreen(name) {
  currentScreen = name;
  $('screen-timer').style.display = name === 'timer' ? 'block' : 'none';
  $('screen-list').style.display = name === 'list' ? 'block' : 'none';
  $('tab-timer').classList.toggle('active', name === 'timer');
  $('tab-list').classList.toggle('active', name === 'list');
  if (name === 'list') {
    refreshProjectList();
    renderList();
  }
}
function start() {
  const intent = $('intent').value.trim();
  if (!intent) return;
  active = {
    id: uid(),
    project: $('project').value.trim(),
    intent,
    start: nowIso(),
  };
  saveAll();
  $('project').value = '';
  $('intent').value = '';
  $('result').value = '';
  updateStartButton();
  renderTimer();
  startTicking();
}
function stop() {
  if (!active) return;
  entries.push({
    ...active,
    stop: nowIso(),
    result: $('result').value.trim(),
    modified: nowIso(),
  });
  active = null;
  saveAll();
  $('result').value = '';
  renderTimer();
  stopTicking();
  syncNow();
}
function toLocalInput(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  return new Date(d.getTime() - d.getTimezoneOffset() * 60000).toISOString().slice(0,16);
}
function fromLocalInput(val) { return val ? new Date(val).toISOString() : null; }
function openEdit(id) {
  const entry = entries.find(e => e.id === id);
  if (!entry) return;
  editingId = id;
  $('edit-project').value = entry.project || '';
  $('edit-intent').value = entry.intent || '';
  $('edit-result').value = entry.result || '';
  $('edit-start').value = toLocalInput(entry.start);
  $('edit-stop').value = toLocalInput(entry.stop);
  $('modal-back').classList.add('show');
}
function closeEdit() { $('modal-back').classList.remove('show'); editingId = null; }
function saveEdit() {
  const entry = entries.find(e => e.id === editingId);
  if (!entry) return;
  entry.project = $('edit-project').value.trim();
  entry.intent = $('edit-intent').value.trim();
  entry.result = $('edit-result').value.trim();
  const newStart = fromLocalInput($('edit-start').value);
  const newStop = fromLocalInput($('edit-stop').value);
  if (newStart) entry.start = newStart;
  if (newStop) entry.stop = newStop;
  entry.modified = nowIso();
  saveAll();
  refreshProjectList();
  renderList();
  closeEdit();
  syncNow();
}
function deleteEdit() {
  if (!confirm('Eintrag wirklich löschen?')) return;
  const idx = entries.findIndex(e => e.id === editingId);
  if (idx === -1) { closeEdit(); return; }
  const tombstone = { ...entries[idx], deleted: true, modified: nowIso() };
  entries.splice(idx, 1);
  saveAll();
  refreshProjectList();
  renderList();
  closeEdit();
  // Tombstone temporär anhängen für den Sync, danach wieder entfernen
  if (syncConfig) {
    entries.push(tombstone);
    syncNow().finally(() => {
      entries = entries.filter(e => !e.deleted);
      saveAll();
    });
  }
}
function csvEscape(v) {
  v = String(v == null ? '' : v);
  return /[";\n\r]/.test(v) ? '"' + v.replace(/"/g,'""') + '"' : v;
}
function exportCSV() {
  const header = ['Datum','Start','Stopp','Dauer','Projekt','Absicht','Ergebnis'];
  const rows = entries.slice().sort((a,b) => new Date(a.start) - new Date(b.start)).map(e => [
    formatDate(e.start),
    formatTimeFull(e.start),
    e.stop ? formatTimeFull(e.stop) : '',
    e.stop ? formatDuration(new Date(e.stop) - new Date(e.start)) : '',
    e.project || '',
    e.intent || '',
    e.result || '',
  ].map(csvEscape).join(';'));
  const csv = '﻿' + [header.join(';'), ...rows].join('\r\n');
  downloadBlob(csv, `zeiterfassung_${dateStamp()}.csv`, 'text/csv;charset=utf-8');
}
function exportJSON() {
  const data = JSON.stringify({ version: 1, exported: nowIso(), entries }, null, 2);
  downloadBlob(data, `zeiterfassung_${dateStamp()}.json`, 'application/json');
}
function dateStamp() {
  const d = new Date();
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
}
function downloadBlob(content, filename, type) {
  const blob = new Blob([content], { type });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}
function importJSON(file) {
  const reader = new FileReader();
  reader.onload = () => {
    try {
      const data = JSON.parse(reader.result);
      if (!data.entries || !Array.isArray(data.entries)) throw new Error('Ungültiges Format');
      const merge = confirm(`${data.entries.length} Einträge gefunden.\n\nOK = zu bestehenden hinzufügen (Duplikate via ID vermieden)\nAbbrechen = alle ersetzen`);
      if (merge) {
        const ids = new Set(entries.map(e => e.id));
        data.entries.forEach(e => {
          if (!e.modified) e.modified = e.stop || e.start;
          if (!ids.has(e.id) && !e.deleted) entries.push(e);
        });
      } else {
        if (!confirm('Wirklich alle bestehenden Einträge ersetzen?')) return;
        entries = data.entries.filter(e => !e.deleted).map(e => ({ ...e, modified: e.modified || e.stop || e.start }));
      }
      saveAll();
      refreshProjectList();
      renderList();
      syncNow();
      alert('Import erfolgreich.');
    } catch (err) {
      alert('Import fehlgeschlagen: ' + err.message);
    }
  };
  reader.readAsText(file);
}

// ---------- Settings ----------

function openSettings() {
  if (syncConfig) {
    $('cfg-owner').value = syncConfig.owner || '';
    $('cfg-repo').value = syncConfig.repo || 'zeiterfassung-data';
    $('cfg-path').value = syncConfig.path || 'data.json';
    $('cfg-token').value = syncConfig.token || '';
  } else {
    $('cfg-owner').value = '';
    $('cfg-repo').value = 'zeiterfassung-data';
    $('cfg-path').value = 'data.json';
    $('cfg-token').value = '';
  }
  $('cfg-result').textContent = '';
  $('cfg-result').className = '';
  $('settings-back').classList.add('show');
}
function closeSettings() { $('settings-back').classList.remove('show'); }

async function saveSettings() {
  const owner = $('cfg-owner').value.trim();
  const repo = $('cfg-repo').value.trim();
  const path = $('cfg-path').value.trim() || 'data.json';
  const token = $('cfg-token').value.trim();
  if (!owner || !repo || !token) {
    $('cfg-result').textContent = 'Bitte Benutzername, Repo und Token ausfüllen.';
    $('cfg-result').className = 'err';
    return;
  }
  $('cfg-result').textContent = 'Verbinde…';
  $('cfg-result').className = '';
  const previousConfig = syncConfig;
  syncConfig = { owner, repo, path, token };
  try {
    await syncNow({ force: false });
    if (syncStatus === 'error') {
      $('cfg-result').textContent = 'Fehler: ' + (window._lastSyncError || 'unbekannt');
      $('cfg-result').className = 'err';
      syncConfig = previousConfig;
      return;
    }
    saveConfig();
    schedulePoll();
    $('cfg-result').textContent = '✓ Verbunden. Daten synchronisiert.';
    $('cfg-result').className = 'ok';
    setTimeout(closeSettings, 800);
  } catch (err) {
    $('cfg-result').textContent = 'Fehler: ' + err.message;
    $('cfg-result').className = 'err';
    syncConfig = previousConfig;
  }
}

function clearSettings() {
  if (!confirm('Sync trennen? Lokale Daten bleiben erhalten.')) return;
  syncConfig = null;
  saveConfig();
  if (syncPollTimer) { clearInterval(syncPollTimer); syncPollTimer = null; }
  setSyncStatus('off');
  closeSettings();
}

function onSyncStatusClick() {
  if (!syncConfig) { openSettings(); return; }
  if (syncStatus === 'error' && window._lastSyncError) {
    alert('Sync-Fehler:\n\n' + window._lastSyncError);
    return;
  }
  syncNow({ force: true });
}

// ---------- Events ----------

$('btn-start').addEventListener('click', start);
$('btn-stop').addEventListener('click', stop);
$('intent').addEventListener('input', updateStartButton);
$('tab-timer').addEventListener('click', () => switchScreen('timer'));
$('tab-list').addEventListener('click', () => switchScreen('list'));
$('filter-project').addEventListener('change', renderList);
$('filter-date').addEventListener('change', renderList);
$('btn-csv').addEventListener('click', exportCSV);
$('btn-json').addEventListener('click', exportJSON);
$('file-import').addEventListener('change', (e) => {
  if (e.target.files[0]) { importJSON(e.target.files[0]); e.target.value = ''; }
});
$('edit-cancel').addEventListener('click', closeEdit);
$('edit-save').addEventListener('click', saveEdit);
$('edit-delete').addEventListener('click', deleteEdit);
$('modal-back').addEventListener('click', (e) => { if (e.target.id === 'modal-back') closeEdit(); });
$('btn-settings').addEventListener('click', openSettings);
$('sync-status').addEventListener('click', onSyncStatusClick);
$('cfg-cancel').addEventListener('click', closeSettings);
$('cfg-save').addEventListener('click', saveSettings);
$('cfg-clear').addEventListener('click', clearSettings);
$('settings-back').addEventListener('click', (e) => { if (e.target.id === 'settings-back') closeSettings(); });

document.addEventListener('visibilitychange', () => {
  if (!document.hidden && syncConfig) syncNow();
});

// Init
if (active) startTicking();
if (migrated) saveAll();
refreshProjectList();
renderTimer();
updateStartButton();
if (syncConfig) {
  setSyncStatus('idle');
  syncNow();
  schedulePoll();
} else {
  setSyncStatus('off');
}
</script>
